image: node:16-alpine

variables:
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_DRIVER: overlay2
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  CYPRESS_CACHE_FOLDER: "$CI_PROJECT_DIR/Cypress"

.init_ssh: &init_ssh |
  apk add --update openssh-client bash
  mkdir -p ~/.ssh
  chmod 700 ~/.ssh
  echo $SSH_PRIVATE_KEY >> ~/.ssh/id_ed25519
  chmod 400 ~/.ssh/id_ed25519
  eval $(ssh-agent -s)
  echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
  echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .npm
    - Cypress
    - node_modules

build:
  image: docker:stable
  services:
    - docker:stable-dind
  before_script:
    - DOCKER_TAG=${CI_COMMIT_TAG:-branch-$CI_COMMIT_REF_NAME}
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $CI_REGISTRY/ludo237/ludo237.com/remix:production || true
    - docker build . --cache-from $CI_REGISTRY/ludo237/ludo237.com/remix:production -t $CI_REGISTRY/ludo237/ludo237.com/remix:production --build-arg DATABASE_URL=${DATABASE_URL} --build-arg SESSION_SECRET=${SESSION_SECRET} -f ./Dockerfile
    - docker push $CI_REGISTRY/ludo237/ludo237.com/remix:production
